services:
  - type: web
    name: recipe-video-server
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT --timeout 300 server:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        generateValue: true
